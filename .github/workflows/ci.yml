name: CI

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
    branches: [master]
    paths-ignore: &paths-ignore
      - "CHANGELOG.md"
      - "LICENSE"
      - ".github/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - ".vscode/**"
      - ".editorconfig"
      - ".spelling"
  push:
    branches: [master]
    paths-ignore: *paths-ignore
  workflow_dispatch:

jobs:
  build:
    name: Build Module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: AtlassianPS/AtlassianPS.Standards/.github/actions/setup-powershell@v0.1.6

      - name: Build
        run: Invoke-Build -Task ShowInfo, Clean, Build
        shell: pwsh

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: Release
          path: ./Release/

  test_windows_ps5:
    name: Test (Windows PS5)
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: AtlassianPS/AtlassianPS.Standards/.github/actions/setup-powershell@v0.1.6
        with:
          ps-version: "5"
          skip-setup: "true"

      - name: Setup dependencies
        run: |
          ./Tools/setup.ps1
          Invoke-Build -Task ShowDebugInfo
        shell: powershell

      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          name: Release
          path: ./Release/

      - name: Test
        run: Invoke-Build -Task Test
        shell: powershell

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Windows-PS5-Unit-Tests
          path: Test*.xml

  test_pwsh:
    name: Test (${{ matrix.name }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, name: "Windows PS7" }
          - { os: ubuntu-latest, name: "Ubuntu" }
          - { os: macos-latest, name: "macOS" }
    steps:
      - uses: actions/checkout@v6
      - uses: AtlassianPS/AtlassianPS.Standards/.github/actions/setup-powershell@v0.1.6

      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          name: Release
          path: ./Release/

      - name: Test
        run: Invoke-Build -Task Test
        shell: pwsh

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}-Unit-Tests
          path: Test*.xml

  release_dry_run:
    name: Release Dry Run
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: AtlassianPS/AtlassianPS.Standards/.github/actions/setup-powershell@v0.1.6

      - name: Validate release packaging path
        shell: pwsh
        run: |
          Invoke-Build -Task Clean, Build, SetVersion, Package -VersionToPublish v9999.0.0-alpha1

          $manifestPath = './Release/JiraAgilePS/JiraAgilePS.psd1'
          $packagePath = './Release/JiraAgilePS.zip'

          if (-not (Test-Path $manifestPath)) {
            throw "Missing release manifest: $manifestPath"
          }
          if (-not (Test-Path $packagePath)) {
            throw "Missing release package: $packagePath"
          }

          $manifest = Test-ModuleManifest -Path $manifestPath -ErrorAction Stop -WarningAction SilentlyContinue
          if ($manifest.Version.ToString() -ne '9999.0.0') {
            throw "Expected manifest version 9999.0.0, got $($manifest.Version)"
          }

          $manifestData = Import-PowerShellDataFile -Path $manifestPath
          if ($manifestData.PrivateData.PSData.Prerelease -ne 'alpha1') {
            throw "Expected prerelease alpha1, got '$($manifestData.PrivateData.PSData.Prerelease)'"
          }

  ci-required:
    name: CI Result
    if: always()
    needs: [build, test_windows_ps5, test_pwsh, release_dry_run]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate job results
        shell: bash
        run: |
          results='${{ toJSON(needs) }}'
          echo "Job results:"
          echo "$results"
          if echo "$results" | grep -E '"result":[[:space:]]*"(failure|cancelled)"' > /dev/null; then
            echo "::error::One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All required jobs passed or were skipped."
